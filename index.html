<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rafting crafting</title>
    <link rel="stylesheet" href="assets/styles/style.css">
</head>

<body>

    <main>
        <canvas id="gameCanva"></canvas>

        <div id="recipe-container">
            <div id="recipe-items">
                <!-- Les ingrédients de la "recette" seront ajoutés ici via JS -->
            </div>
        </div>
        <div id="beer-status"></div>
        <div id="pause-btn" class="pause-icon" style="display: none;">
            <div class="pause-bar"></div>
            <div class="pause-bar"></div>
        </div>

        <div id="startScreen">
            <h1 class="game-title">RADEAU CRAFTER</h1>
            <div class="game-rules">
                Ramasser les elements dans le bon ordre, a l'aide du l'orientation du telephone. Attention aux pieges
            </div>
            <button class="startBtn">JOUER</button>
        </div>

        <div id="pauseScreen" style="display: none;">
            <h2>PAUSE</h2>
            <button class="startBtn" id="resumeBtn">REPRENDRE</button>
            <button class="startBtn" id="restartBtn">RECOMMENCER</button>
            <button class="startBtn quitBtn" id="quitBtn">TERMINER LE JEU</button>
        </div>
    </main>

    <script src="assets/js/script.js?v=2"></script>
</body>

</html>
