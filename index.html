<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rafting crafting</title>
    <link rel="stylesheet" href="assets/styles/style.css">
</head>

<body>

    <main>
        <canvas id="gameCanva"></canvas>

        <div id="recipe-container">
            <div id="recipe-items">
                <!-- Les ingrédients de la "recette" seront ajoutés ici via JS -->
            </div>
        </div>
        <div id="beer-status"></div>
        <div id="pause-btn" class="pause-icon" style="display: none;">
            <div class="pause-bar"></div>
            <div class="pause-bar"></div>
        </div>

        <div id="startScreen" style="display: none;">
            <h1 class="game-title">RADEAU CRAFTER</h1>
            <div class="game-rules">
                Collect all the ingredients in the right order. Be aware of debuffs
            </div>
            <button class="startBtn">PLAY</button>
        </div>

        <div id="pauseScreen" style="display: none;">
            <h2>PAUSE</h2>
            <button class="startBtn" id="resumeBtn">RESUME</button>
            <button class="startBtn" id="restartBtn">RESTART</button>
            <button class="startBtn quitBtn" id="quitBtn">END GAME</button>
        </div>

        <div id="victoryScreen" style="display: none;">
            <h1 class="game-title">VICTORY !</h1>
            <div class="game-rules">
                You won a "Mulhousien outfit".
            </div>
            <div class="lehmann-victory-sprite"></div>
            <button class="startBtn" id="victoryContinueBtn">CONTINUE</button>
            <button class="startBtn" id="victoryRestartBtn">REPLAY</button>
        </div>
    </main>

    <script src="assets/js/cinematic.js"></script>
    <script src="assets/js/script.js?v=2"></script>
</body>

</html>
